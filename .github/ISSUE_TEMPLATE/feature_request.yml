name: Feature request
description: Suggest a product or contributor workflow improvement
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What job is not served well today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints or tradeoffs
